AWSTemplateFormatVersion: '2010-09-09'
Description: High Availability Web Application with ALB, ASG, RDS, WAF, and NAT Gateway

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name used to label resources

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00b755d6f030afea9
    Description: Existing VPC ID

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0a99694c43e26d072,subnet-0a51b35b6e752a510
    Description: Existing public subnet IDs for the Application Load Balancer

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-07d9361f29efa5ee9,subnet-0f8c9a8bac6c01862
    Description: Existing private subnet IDs for EC2 instances

  DbSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-03ae21cb6490cec43,subnet-0e270bdae0f1c2c26
    Description: Existing private DB subnet IDs for RDS

  NatPublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0a99694c43e26d072
    Description: Public subnet where the NAT Gateway will be created

  PrivateRouteTableId:
    Type: String
    Default: rtb-05e59490f8fd9364d
    Description: Private route table ID used by the private EC2 subnets

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: DAVIDSKEYPAIR
    Description: Existing EC2 key pair name for SSH access

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI ID

  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for web servers

  DbName:
    Type: String
    Default: hawebdb
    Description: MySQL database name

  DbUsername:
    Type: String
    Default: admin
    Description: MySQL admin username

  DbPassword:
    Type: String
    NoEcho: true
    Description: MySQL admin password. Enter this during stack creation.

  AlarmSnsTopicArn:
    Type: String
    Default: arn:aws:sns:us-east-1:654375431894:dlq-alerts-clean
    Description: Existing SNS topic ARN for CloudWatch alarm notifications

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to the Application Load Balancer
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-alb-sg'

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the ALB to EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ec2-sg'

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL traffic from EC2 instances to RDS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-rds-sg'

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref NatPublicSubnetId
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-gateway'

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTableId
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-ha-web-alb'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ha-web-alb'

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-ha-web-tg'
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ha-web-tg'

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  WebLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${EnvironmentName}-ha-web-lt'
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref Ec2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -eux

            dnf update -y
            dnf install -y python3 python3-pip

            mkdir -p /opt/ha-web-app

            cat > /opt/ha-web-app/requirements.txt << 'EOF'
            flask
            pymysql
            gunicorn
            EOF

            pip3 install -r /opt/ha-web-app/requirements.txt

            cat > /opt/ha-web-app/app.py << 'EOF'
            import os
            import socket
            from datetime import datetime

            import pymysql
            from flask import Flask

            app = Flask(__name__)

            DB_HOST = os.environ.get("DB_HOST")
            DB_NAME = os.environ.get("DB_NAME")
            DB_USER = os.environ.get("DB_USER")
            DB_PASSWORD = os.environ.get("DB_PASSWORD")

            def get_connection():
                return pymysql.connect(
                    host=DB_HOST,
                    user=DB_USER,
                    password=DB_PASSWORD,
                    database=DB_NAME,
                    connect_timeout=5,
                    cursorclass=pymysql.cursors.DictCursor,
                    autocommit=True,
                )

            def init_db():
                with get_connection() as conn:
                    with conn.cursor() as cursor:
                        cursor.execute(
                            """
                            CREATE TABLE IF NOT EXISTS visits (
                                id INT AUTO_INCREMENT PRIMARY KEY,
                                instance_id VARCHAR(255),
                                visited_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                            )
                            """
                        )

            @app.route("/health")
            def health():
                return "OK", 200

            @app.route("/db-test")
            def db_test():
                try:
                    init_db()
                    return "Database connection OK", 200
                except Exception as e:
                    return f"Database connection failed: {e}", 500

            @app.route("/")
            def index():
                instance_name = socket.gethostname()
                try:
                    init_db()
                    with get_connection() as conn:
                        with conn.cursor() as cursor:
                            cursor.execute(
                                "INSERT INTO visits (instance_id) VALUES (%s)",
                                (instance_name,),
                            )
                            cursor.execute("SELECT COUNT(*) AS visit_count FROM visits")
                            result = cursor.fetchone()

                    visit_count = result["visit_count"]
                    return f"""
                    <html>
                      <head><title>HA Web App</title></head>
                      <body style="font-family: Arial; padding: 40px;">
                        <h1>Hello from Flask on private EC2</h1>
                        <p><strong>Instance:</strong> {instance_name}</p>
                        <p><strong>Total visits stored in RDS:</strong> {visit_count}</p>
                        <p><strong>Time:</strong> {datetime.utcnow().isoformat()} UTC</p>
                      </body>
                    </html>
                    """, 200
                except Exception as e:
                    return f"Application reached Flask, but database failed: {e}", 500

            if __name__ == "__main__":
                app.run(host="0.0.0.0", port=80)
            EOF

            cat > /etc/systemd/system/ha-web-flask.service << EOF
            [Unit]
            Description=HA Web Flask App
            After=network-online.target
            Wants=network-online.target

            [Service]
            Environment=DB_HOST=${MySqlDatabase.Endpoint.Address}
            Environment=DB_NAME=${DbName}
            Environment=DB_USER=${DbUsername}
            Environment=DB_PASSWORD=${DbPassword}
            WorkingDirectory=/opt/ha-web-app
            ExecStart=/usr/local/bin/gunicorn --bind 0.0.0.0:80 app:app
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable ha-web-flask
            systemctl start ha-web-flask

  WebAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: PrivateDefaultRoute
    Properties:
      AutoScalingGroupName: !Sub '${EnvironmentName}-ha-web-asg'
      VPCZoneIdentifier: !Ref PrivateSubnetIds
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      TargetGroupARNs:
        - !Ref WebTargetGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref WebLaunchTemplate
        Version: !GetAtt WebLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ha-web-instance'
          PropagateAtLaunch: true

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnet group for RDS
      SubnetIds: !Ref DbSubnetIds
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-db-subnet-group'

  MySqlDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${EnvironmentName}-ha-web-db'
      Engine: mysql
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp3
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref DbSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      DeletionProtection: false

  DaveIpSet:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: !Sub '${EnvironmentName}-dave-ip-set'
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses:
        - 70.75.160.69/32

  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${EnvironmentName}-ha-web-acl'
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${EnvironmentName}-ha-web-acl'
        SampledRequestsEnabled: true
      Rules:
        - Name: allow-dave-ip
          Priority: 0
          Action:
            Allow: {}
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt DaveIpSet.Arn
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: allow-dave-ip
            SampledRequestsEnabled: true

        - Name: block-public-health
          Priority: 1
          Action:
            Block: {}
          Statement:
            ByteMatchStatement:
              SearchString: /health
              FieldToMatch:
                UriPath: {}
              TextTransformations:
                - Priority: 0
                  Type: NONE
              PositionalConstraint: EXACTLY
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: block-public-health
            SampledRequestsEnabled: true

        - Name: geo-allow-na
          Priority: 2
          Action:
            Block: {}
          Statement:
            NotStatement:
              Statement:
                GeoMatchStatement:
                  CountryCodes:
                    - CA
                    - US
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: geo-allow-na
            SampledRequestsEnabled: true

        - Name: rate-limit-test
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 20
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: rate-limit-test
            SampledRequestsEnabled: true

        - Name: AWS-AWSManagedRulesSQLiRuleSet
          Priority: 4
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWS-AWSManagedRulesSQLiRuleSet
            SampledRequestsEnabled: true

  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref ApplicationLoadBalancer
      WebACLArn: !GetAtt WebAcl.Arn

  HealthyHostCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-healthy-host-count-low'
      AlarmDescription: Alarm when fewer than 2 healthy targets are available behind the ALB
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt WebTargetGroup.TargetGroupFullName
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 2
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSnsTopicArn
      OKActions:
        - !Ref AlarmSnsTopicArn

Outputs:
  LoadBalancerDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  WebTargetGroupArn:
    Description: ARN of the web target group
    Value: !Ref WebTargetGroup

  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref WebAutoScalingGroup

  DatabaseEndpoint:
    Description: RDS database endpoint address
    Value: !GetAtt MySqlDatabase.Endpoint.Address

  NatGatewayId:
    Description: NAT Gateway ID used by private EC2 instances for outbound internet
    Value: !Ref NatGateway

  WebAclArn:
    Description: ARN of the WAF Web ACL
    Value: !GetAtt WebAcl.Arn
